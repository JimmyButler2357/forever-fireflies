<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forever Fireflies — Logo Preview</title>
  <style>
    body {
      margin: 0;
      padding: 32px;
      background: #FAF8F5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #2C2420;
    }
    h1 {
      font-family: Georgia, serif;
      font-weight: normal;
      font-size: 24px;
      margin: 0 0 32px;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      color: #6B6058;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 0 0 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 32px;
      max-width: 800px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(44, 36, 32, 0.06);
    }
    .sizes {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .size-group {
      text-align: center;
    }
    .size-label {
      font-size: 11px;
      color: #6B6058;
      margin-top: 6px;
    }
    img {
      display: block;
      border-radius: 8px;
    }
    .dark-bg {
      background: #2C2420;
      padding: 16px;
      border-radius: 8px;
      display: inline-block;
    }
    .dark-bg img {
      filter: invert(1);
    }
  </style>
</head>
<body>
  <h1>Forever Fireflies — Logo Preview</h1>

  <div class="grid">
    <div class="card">
      <h2>Color version (logo.svg)</h2>
      <div class="sizes">
        <div class="size-group">
          <img src="logo.svg" width="180" height="180" alt="Logo at 180px">
          <div class="size-label">180px (iOS app icon)</div>
        </div>
        <div class="size-group">
          <img src="logo.svg" width="96" height="96" alt="Logo at 96px">
          <div class="size-label">96px</div>
        </div>
        <div class="size-group">
          <img src="logo.svg" width="48" height="48" alt="Logo at 48px">
          <div class="size-label">48px</div>
        </div>
        <div class="size-group">
          <img src="logo.svg" width="32" height="32" alt="Logo at 32px">
          <div class="size-label">32px (favicon)</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Monochrome (logo-monochrome.svg)</h2>
      <div class="sizes">
        <div class="size-group">
          <img src="logo-monochrome.svg" width="180" height="180" alt="Mono logo at 180px">
          <div class="size-label">Brown on light</div>
        </div>
        <div class="size-group">
          <div class="dark-bg">
            <img src="logo-monochrome.svg" width="96" height="96" alt="Mono logo white on dark">
          </div>
          <div class="size-label">White on dark</div>
        </div>
        <div class="size-group">
          <img src="logo-monochrome.svg" width="32" height="32" alt="Mono logo at 32px">
          <div class="size-label">32px notification</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
