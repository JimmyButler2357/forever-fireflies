<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feature Graphic Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      background: #e8e0d8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      color: #2C2420;
    }

    .instructions {
      margin-bottom: 24px;
      font-size: 14px;
      color: #8E7E74;
      text-align: center;
    }

    .graphic {
      width: 1024px;
      height: 500px;
      background: #FAF8F5;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Warm radial glow — matches app's warm gradient feel */
    .graphic::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 140%;
      height: 140%;
      background: radial-gradient(
        ellipse at center,
        rgba(232, 114, 74, 0.06) 0%,
        rgba(242, 201, 76, 0.04) 25%,
        transparent 55%
      );
      pointer-events: none;
    }

    /* Subtle accent line */
    .accent-line {
      width: 48px;
      height: 2px;
      background: #E8724A;
      margin-bottom: 24px;
      border-radius: 9999px;
      position: relative;
      z-index: 1;
    }

    .title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 64px;
      font-weight: 300;
      color: #2C2420;
      line-height: 1.1;
      letter-spacing: -1px;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .title-accent {
      color: #E8724A;
      font-style: italic;
    }

    .tagline {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: #8E7E74;
      margin-top: 16px;
      letter-spacing: 2px;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

    /* Firefly dots — warmer, subtler on light bg */
    .dot {
      position: absolute;
      border-radius: 9999px;
      z-index: 0;
    }

    .dot-1 { width: 5px; height: 5px; background: #F2C94C; top: 18%; left: 12%; opacity: 0.5; box-shadow: 0 0 8px 2px rgba(242, 201, 76, 0.3); }
    .dot-2 { width: 4px; height: 4px; background: #E8724A; top: 30%; right: 15%; opacity: 0.4; box-shadow: 0 0 6px 2px rgba(232, 114, 74, 0.25); }
    .dot-3 { width: 6px; height: 6px; background: #F2C94C; bottom: 25%; left: 20%; opacity: 0.35; box-shadow: 0 0 10px 3px rgba(242, 201, 76, 0.3); }
    .dot-4 { width: 4px; height: 4px; background: #F2C94C; top: 22%; right: 25%; opacity: 0.5; box-shadow: 0 0 8px 2px rgba(242, 201, 76, 0.35); }
    .dot-5 { width: 5px; height: 5px; background: #E8724A; bottom: 35%; right: 10%; opacity: 0.35; box-shadow: 0 0 8px 2px rgba(232, 114, 74, 0.2); }
    .dot-6 { width: 4px; height: 4px; background: #F2C94C; top: 40%; left: 8%; opacity: 0.3; box-shadow: 0 0 6px 2px rgba(242, 201, 76, 0.25); }
    .dot-7 { width: 6px; height: 6px; background: #F2C94C; bottom: 20%; right: 30%; opacity: 0.4; box-shadow: 0 0 10px 3px rgba(242, 201, 76, 0.3); }
    .dot-8 { width: 4px; height: 4px; background: #E8724A; top: 15%; left: 35%; opacity: 0.35; box-shadow: 0 0 6px 2px rgba(232, 114, 74, 0.2); }

    .hint {
      margin-top: 24px;
      font-size: 13px;
      color: #8E7E74;
      text-align: center;
    }
  </style>
</head>
<body>

  <p class="instructions">Feature Graphic Preview — 1024 x 500px<br>Take a screenshot of the graphic below, or right-click and inspect to save</p>

  <div class="graphic">
    <!-- Firefly dots scattered around -->
    <div class="dot dot-1"></div>
    <div class="dot dot-2"></div>
    <div class="dot dot-3"></div>
    <div class="dot dot-4"></div>
    <div class="dot dot-5"></div>
    <div class="dot dot-6"></div>
    <div class="dot dot-7"></div>
    <div class="dot dot-8"></div>

    <div class="accent-line"></div>
    <div class="title">Forever <span class="title-accent">Fireflies</span></div>
    <div class="tagline">A voice journal for parents</div>
  </div>

  <button id="download" style="margin-top:24px; font-family:'DM Sans',sans-serif; font-size:14px; padding:12px 28px; background:#E8724A; color:#FAF8F5; border:none; border-radius:9999px; cursor:pointer;">Download as 1024x500 PNG</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    document.getElementById('download').addEventListener('click', function() {
      const graphic = document.querySelector('.graphic');
      html2canvas(graphic, {
        width: 1024,
        height: 500,
        scale: 1,
        useCORS: true,
        backgroundColor: '#FAF8F5'
      }).then(function(canvas) {
        const link = document.createElement('a');
        link.download = 'forever-fireflies-feature-graphic.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    });
  </script>

</body>
</html>
