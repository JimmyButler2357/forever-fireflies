<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forever Fireflies — Coming Soon</title>
  <meta name="description" content="A voice-first memory journal that helps parents capture the fleeting, everyday moments with their kids.">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAF8F5;
      --card: #FEFCF9;
      --text: #2C2420;
      --text-muted: #B5AAA0;
      --accent: #E8724A;
      --accent-pressed: #CC6441;
      --glow: #F2C94C;
      --glow-shadow: rgba(242, 201, 76, 0.35);
      --ember-bg: #3D322C;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--ember-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    /* Warm ember glow from the bottom */
    body::before {
      content: '';
      position: fixed;
      bottom: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 140vmax;
      height: 90vmax;
      background: radial-gradient(
        ellipse at center bottom,
        rgba(232, 114, 74, 0.12) 0%,
        rgba(242, 201, 76, 0.06) 25%,
        rgba(140, 126, 116, 0.04) 45%,
        transparent 65%
      );
      pointer-events: none;
    }

    /* Particle layer */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      border-radius: 9999px;
      pointer-events: none;
      will-change: transform, opacity;
    }

    /* Content */
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 560px;
    }

    .pre-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(44px, 9vw, 72px);
      font-weight: 300;
      color: var(--bg);
      line-height: 1.08;
      letter-spacing: -1.5px;
      margin-bottom: 8px;
    }

    .title-accent {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(44px, 9vw, 72px);
      font-weight: 300;
      font-style: italic;
      color: var(--accent);
      line-height: 1.08;
      letter-spacing: -1.5px;
      margin-bottom: 28px;
    }

    .tagline {
      font-size: 16px;
      line-height: 1.7;
      color: var(--text-muted);
      margin-bottom: 48px;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }

    .cta {
      display: inline-block;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--card);
      background: var(--accent);
      border: none;
      border-radius: 9999px;
      padding: 14px 36px;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 0 20px 4px rgba(232, 114, 74, 0.2);
    }

    .cta:hover {
      background: var(--accent-pressed);
      box-shadow: 0 0 28px 6px rgba(232, 114, 74, 0.3);
      transform: translateY(-1px);
    }

    .footer-links {
      margin-top: 48px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .footer-links a:hover {
      color: var(--accent);
    }

    .footer-links .dot {
      margin: 0 8px;
      opacity: 0.4;
    }

    @media (prefers-reduced-motion: reduce) {
      .particle { display: none; }
    }
  </style>
</head>
<body>

  <div class="particles" id="particles"></div>

  <div class="content">
    <p class="pre-title">A Memory Journal for Parents</p>
    <h1 class="title">Forever</h1>
    <p class="title-accent">Fireflies</p>
    <p class="tagline">Capture the everyday moments with your kids before they slip away.</p>
    <button class="cta" id="cta">Coming Soon</button>
    <nav class="footer-links">
      <a href="/privacy.html">Privacy</a>
      <span class="dot">&middot;</span>
      <a href="/delete-account.html">Delete Account</a>
    </nav>
  </div>

  <script>
    const container = document.getElementById('particles');
    const PARTICLE_COUNT = 14;
    const particles = [];
    const W = () => window.innerWidth;
    const H = () => window.innerHeight;

    function createParticle() {
      const el = document.createElement('div');
      el.className = 'particle';

      const size = 3 + Math.random() * 3;
      const isWarm = Math.random() > 0.7;
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      el.style.background = isWarm ? 'var(--accent)' : 'var(--glow)';
      container.appendChild(el);

      const p = {
        el,
        x: 0.05 + Math.random() * 0.9,
        y: Math.random(),
        speed: 0.015 + Math.random() * 0.015,
        wobbleOffset: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.3 + Math.random() * 0.4,
        wobbleAmp: 8 + Math.random() * 12,
        opacityBase: 0.35 + Math.random() * 0.3,
        opacityOffset: Math.random() * Math.PI * 2,
        vx: 0,
        vy: 0,
        scale: 1,
        glowExtra: 0,
      };

      particles.push(p);
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      createParticle();
    }

    let lastTime = performance.now();

    function animate(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.1);
      lastTime = now;

      particles.forEach(p => {
        if (Math.abs(p.vx) > 0.1 || Math.abs(p.vy) > 0.1) {
          p.x += (p.vx * dt) / W();
          p.y += (p.vy * dt) / H();
          p.vx *= Math.pow(0.04, dt);
          p.vy *= Math.pow(0.04, dt);
          p.scale += (1 - p.scale) * Math.min(1, dt * 3);
          p.glowExtra *= Math.pow(0.02, dt);
        }

        p.y += p.speed * dt;

        if (p.y > 1.05 || p.y < -0.1 || p.x < -0.1 || p.x > 1.1) {
          p.y = -0.05;
          p.x = 0.05 + Math.random() * 0.9;
          p.speed = 0.015 + Math.random() * 0.015;
          p.vx = 0;
          p.vy = 0;
          p.scale = 1;
          p.glowExtra = 0;
        }

        const wobble = Math.sin(now / 1000 * p.wobbleSpeed + p.wobbleOffset) * p.wobbleAmp;
        const screenX = p.x * W() + wobble;
        const screenY = (1 - p.y) * H();

        const edgeFade = Math.min(1, p.y * 10, (1.05 - p.y) * 10);
        const pulse = p.opacityBase + Math.sin(now / 1000 * 0.8 + p.opacityOffset) * 0.15;
        const opacity = Math.max(0, pulse * edgeFade);

        const baseGlow = 10 + opacity * 8;
        const glow = baseGlow + p.glowExtra;

        p.el.style.transform = `translate(${screenX}px, ${screenY}px) scale(${p.scale})`;
        p.el.style.opacity = opacity;
        p.el.style.boxShadow = opacity > 0.05
          ? `0 0 ${glow}px ${glow * 0.4}px rgba(242, 201, 76, ${0.3 * opacity})`
          : 'none';
      });

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);

    document.getElementById('cta').addEventListener('click', () => {
      particles.forEach(p => {
        const angle = Math.random() * Math.PI * 2;
        const force = 100 + Math.random() * 200;
        p.vx = Math.cos(angle) * force;
        p.vy = Math.sin(angle) * force;
        p.scale = 1.6 + Math.random() * 0.4;
        p.glowExtra = 15 + Math.random() * 10;
      });
    });
  </script>
</body>
</html>
